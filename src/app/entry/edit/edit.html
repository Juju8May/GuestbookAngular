<main class="page">
    <header class="header">
        <h1>{{ title }}</h1>
    </header>

    @if (entry === undefined) {
    <section class="empty-state">
        <p>Der Eintrag wurde nicht gefunden.</p>
    </section>
    } @else {
    <section class="entry-card">
        <div class="entry-header">
        @if (entry.user !== undefined) {
            <h2>{{ entry.user.firstname + ' ' + entry.user.lastname }}</h2>
        } @else {
            <h2>Name nicht verfügbar</h2>
        }
        <p>{{ entry.time | date: 'dd.MM.yyyy, HH:mm' }}</p>
        </div>  
        <form class="entry-form" [formGroup]="entryForm" (ngSubmit)="saveEntry()">
            <label for="note">Notiz:</label>
            <textarea id="note" formControlName="note"></textarea>
            <div class="actions">
                <button type="button" (click)="commentEntry()">
                    <img src="../../../assets/images/kommentar.png" alt="Kommentar hinzufügen" class="icon">
                </button>
                <button type="submit">
                    <img src="../../../assets/images/speichern.png" alt="Änderungen speichern" class="icon">
                </button>
                <button type="button" (click)="deleteEntry()">
                    <img src="../../../assets/images/mulleimer.png" alt="Eintrag löschen" class="icon">
                </button>
                <button type="button" (click)="navigateToOverview()">
                    <img src="../../../assets/images/schaltflache-abbrechen.png" alt="Änderungen abbrechen"
                        class="icon">
                </button>
            </div>
        </form>
    </section>
    }
</main>
