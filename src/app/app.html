<main class="page">
	<section class="header">
		<h1>{{ title }}</h1>
		<p>bereits geschriebene Einträge</p>
	</section>

	@if (entries.length === 0) {
		<section class="empty-state">
			<p>Es gibt noch keine Einträge.</p>
		</section>
	} @else {
		<section class="entry-list">
			@for (entry of entries; track entry.id) {
				<article class="entry-card">
					<header class="entry-top">
						<h2>{{ entry.name }}</h2>
						<time>{{ entry.time | date: 'dd.MM.yyyy, HH:mm' }}</time>
					</header>
					<p class="entry-note">{{ entry.note }}</p>
				</article>
			}
		</section>
	}
    <button class="add-entry-button" (click)="addEntry()">Eintrag hinzufügen</button>
</main>
